<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Tiếng Anh</title>
  <style>
    :root {
      --bg1: #dbeafe;
      --bg2: #e9d5ff;
      --card: rgba(255,255,255,0.94);
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary2: #7c3aed;
      --good: #16a34a;
      --bad: #dc2626;
      --shadow: 0 20px 45px rgba(31,41,55,.15);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .app {
      width: min(980px, 100%);
      background: var(--card);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .hero {
      padding: 28px;
      background: linear-gradient(135deg, #1d4ed8, #7c3aed);
      color: white;
    }
    .hero h1 { margin: 0 0 8px; font-size: 34px; }
    .hero p { margin: 0; opacity: .95; line-height: 1.5; }
    .content { padding: 24px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-top: 14px;
    }
    .card {
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 18px;
      background: white;
      box-shadow: 0 8px 18px rgba(0,0,0,.05);
    }
    .topic {
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .topic:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 26px rgba(0,0,0,.10);
    }
    .tag {
      display: inline-block;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .tag.purple { background: #f5f3ff; color: #7c3aed; }
    .tag.green { background: #ecfdf5; color: #059669; }
    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease, background .15s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary2)); color: white; }
    .btn-soft { background: #eef2ff; color: #3730a3; }
    .btn-outline { background: white; border: 1px solid #cbd5e1; color: #111827; }
    .btn-good { background: #dcfce7; color: #166534; }
    .btn-bad { background: #fee2e2; color: #991b1b; }
    .btn-ghost { background: #f8fafc; color: #334155; }
    .muted { color: var(--muted); }
    .row { display:flex; flex-wrap: wrap; gap: 10px; }
    .between { display:flex; justify-content: space-between; align-items:center; gap: 10px; flex-wrap:wrap; }
    .qbox {
      padding: 20px;
      border-radius: 20px;
      background: white;
      border: 1px solid #e5e7eb;
      box-shadow: 0 8px 18px rgba(0,0,0,.05);
    }
    .options {
      display:grid;
      gap: 10px;
      margin-top: 16px;
    }
    .opt {
      width:100%;
      text-align:left;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #dbe3ea;
      background: #f8fafc;
      cursor: pointer;
      transition: all .16s ease;
      font-size: 16px;
    }
    .opt:hover { background: #eef2ff; border-color: #c7d2fe; }
    .opt.correct { background: #dcfce7; border-color:#86efac; color:#166534; }
    .opt.wrong { background: #fee2e2; border-color:#fca5a5; color:#991b1b; }
    .progress {
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 12px 0 18px;
    }
    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      transition: width .25s ease;
    }
    .pill {
      display:inline-flex;
      align-items:center;
      gap:6px;
      background: #eff6ff;
      color: #1d4ed8;
      padding: 7px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
    }
    .feedback {
      margin-top: 14px;
      border-radius: 16px;
      padding: 14px 16px;
      line-height: 1.6;
      white-space: pre-line;
    }
    .feedback.good { background:#ecfdf5; color:#166534; }
    .feedback.bad { background:#fef2f2; color:#991b1b; }
    .feedback.hint { background:#eff6ff; color:#1d4ed8; }
    .badge {
      display:inline-block;
      margin-top: 8px;
      padding: 8px 12px;
      background: #fef3c7;
      color: #92400e;
      border-radius: 999px;
      font-weight: 700;
    }
    .confetti {
      position: fixed;
      inset: 0;
      pointer-events:none;
      overflow:hidden;
      z-index: 50;
    }
    .confetti span {
      position:absolute;
      top:-20px;
      font-size: 22px;
      animation: fall 1.8s linear forwards;
    }
    @keyframes fall {
      from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      to { transform: translateY(105vh) rotate(420deg); opacity: 0; }
    }
    @media (max-width: 640px) {
      .hero h1 { font-size: 26px; }
      .content { padding: 16px; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="app">
    <div class="hero">
      <h1>Quiz Tiếng Anh</h1>
      <p>Học theo chủ đề, chọn cấp độ, làm từng câu, nhận khen ngợi khi đúng, và có gợi ý tiếng Việt khi chưa biết.</p>
    </div>
    <div id="root" class="content"></div>
  </div>
</div>

<div id="confetti" class="confetti" aria-hidden="true"></div>

___ family.", "options": ["nuclear", "extended", "small", "modern"], "answer": 1, "explain": "Extended family là gia đình mở rộng nhiều thế hệ.", "hint": "Gia đình có ông bà, cô dì chú bác."}, {"q": "The people you are related to are your ________.", "options": ["friends", "relatives", "neighbors", "colleagues"], "answer": 1, "explain": "Relatives là họ hàng, thân nhân.", "hint": "Từ chỉ người thân trong họ."}, {"q": "My mother's brother is my ________.", "options": ["aunt", "nephew", "uncle", "cousin"], "answer": 2, "explain": "Uncle là chú, bác, cậu.", "hint": "Anh/em trai của mẹ."}, {"q": "A male parent is a ________.", "options": ["mother", "father", "brother", "son"], "answer": 1, "explain": "Father là bố.", "hint": "Cha của bạn."}, {"q": "Your brother's wife is your ________.", "options": ["sister", "sister-in-law", "mother-in-law", "aunt"], "answer": 1, "explain": "Sister-in-law là chị/em dâu.", "hint": "Vợ của anh/em trai."}, {"q": "A woman who has never been married is often called ________.", "options": ["single", "widow", "divorced", "bride"], "answer": 0, "explain": "Single là người độc thân.", "hint": "Chưa kết hôn."}, {"q": "My grandfather's wife is my ________.", "options": ["grandmother", "aunt", "mother", "stepmother"], "answer": 0, "explain": "Grandmother là bà nội/bà ngoại.", "hint": "Vợ của ông."}, {"q": "A ________ family consists of only parents and their children.", "options": ["big", "nuclear", "extended", "single"], "answer": 1, "explain": "Nuclear family là gia đình hạt nhân.", "hint": "Chỉ có bố mẹ và con."}, {"q": "The daughter of your step-parent is your ________.", "options": ["half-sister", "stepsister", "cousin", "niece"], "answer": 1, "explain": "Stepsister là chị/em gái kế, con riêng của bố dượng/mẹ kế.", "hint": "Con riêng của cha/mẹ kế."}, {"q": "My son's wife is my ________.", "options": ["daughter-in-law", "stepdaughter", "niece", "aunt"], "answer": 0, "explain": "Daughter-in-law là con dâu.", "hint": "Vợ của con trai bạn."}, {" function shuffle(array) {
  const a = array.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setPage(page) {
  state.page = page;
  render();
}

function startQuiz(topic, level) {
  state.topic = topic;

  state.idx = 0;
  state.score = 0;
  state.triedHint = false;

  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correctIndex) btn.classList.add('correct');
    if (i === chosenIndex && chosenIndex !== correctIndex) btn.classList.add('wrong');
  });
}

function confetti() {
  const root = document.getElementById('confetti');
  root.innerHTML = '';
  const icons = ['🎉','✨','🌟','💖','🏆','🔥'];
  for (let i = 0; i < 28; i++) {
    const span = document.createElement('span');
    span.textContent = icons[Math.floor(Math.random() * icons.length)];
    span.style.left = Math.random() * 100 + 'vw';
    span.style.animationDelay = (Math.random() * 0.3) + 's';
    span.style.fontSize = (16 + Math.random() * 18) + 'px';
    root.appendChild(span);
  }
  setTimeout(() => root.innerHTML = '', 2200);
}

function feedbackBox(type, html) {
  document.getElementById('feedbackArea').innerHTML = `
    <div class="feedback ${type}">${html}</div>
  `;
}

function advance() {
  setTimeout(() => {
    state.idx += 1;
    state.selected = null;
    state.triedHint = false;
    if (state.idx >= state.order.length) renderResult();
    else renderQuiz();
  }, 1300);
}

function answer(index) {
  const q = currentQ();
  state.selected = index;
  const correct = q.answer;
  markOptions(correct, index);

  if (index === correct) {
    state.score += 1;
    confetti();
    feedbackBox('good', `✅ Đúng rồi!<br><b>Giải thích:</b> ${q.explain}<br><span class="badge">Sticker: 🌟 Tuyệt vời, làm rất tốt!</span>`);
  } else {
    feedbackBox('bad', `❌ Chưa đúng.<br><b>Vì sao sai:</b> Bạn chọn đáp án chưa khớp nghĩa của câu.<br><b>Đáp án đúng:</b> ${String.fromCharCode(65 + correct)}. ${q.options[correct]}<br><b>Giải thích:</b> ${q.explain}<br><b>Cách làm:</b> Nhìn từ khóa chính rồi đối chiếu nghĩa tiếng Việt.`);
  }
  advance();
}

function dontKnow() {
  const q = currentQ();
  state.triedHint = true;
  feedbackBox('hint', `💡 Gợi ý tiếng Việt: ${q.hint}<br><br>Cách làm: đọc lại câu, tìm quan hệ (gia đình / sân bay / khách sạn / chuyến đi) rồi chọn từ phù hợp nhất.`);
}

function skipQuestion() {
  const q = currentQ();
  feedbackBox('hint', `⏭ Bạn đã bỏ qua câu này.<br><b>Đáp án đúng:</b> ${String.fromCharCode(65 + q.answer)}. ${q.options[q.answer]}<br><b>Giải thích:</b> ${q.explain}`);
  advance();
}

function renderResult() {
  const root = document.getElementById('root');
  const percent = Math.round((state.score / state.order.length) * 100);
  let badge = 'Tiếp tục luyện nhé';
  if (percent >= 90) badge = 'Siêu đỉnh!';
  else if (percent >= 75) badge = 'Làm rất tốt!';
  else if (percent >= 50) badge = 'Khá ổn, cố thêm chút nữa!';
  root.innerHTML = `
    <div class="card" style="text-align:center;">
      <div class="pill" style="margin-bottom:10px;">Kết quả cuối</div>
      <h2 style="margin-top:8px;">🎉 Hoàn thành bài quiz!</h2>
      <p class="muted">Bạn đã làm đúng <b>${state.score}/${state.order.length}</b> câu (${percent}%).</p>
      <div class="badge">${badge}</div>
      <div style="margin-top:18px; font-size: 44px;">${percent >= 90 ? '🏆🌟🎉' : percent >= 75 ? '🌟🎉' : percent >= 50 ? '👏✨' : '💪📘'}</div>
      <p class="muted" style="max-width: 680px; margin: 12px auto 0; line-height:1.6;">
        Nếu muốn luyện lại, hãy chọn một chủ đề khác hoặc đổi cấp độ để học sâu hơn.
      </p>
      <div class="row" style="justify-content:center; margin-top:16px;">
        <button class="btn btn-primary" onclick="setPage('home')">Làm lại từ đầu</button>
      </div>
    </div>
  `;
  confetti();
}

function render() {
  if (state.page === 'home') renderHome();
  else if (state.page === 'quiz') renderQuiz();
}

render();
