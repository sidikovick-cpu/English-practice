<!doctype html>
<html lang="vi">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Learning Pro</title>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    :root {
      --primary: #4361ee;
      --accent: #4cc9f0;
      --success: #48bb78;
    }
    * { box-sizing: border-box; }
    html { height: 100%; }
    body {
      margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%);
      color: #2d3748; overflow: hidden;
    }
    .app-wrapper {
      width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;
      padding: 20px; overflow: auto;
    }
    .app {
      width: 100%; max-width: 900px; background: white;
      border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden;
      animation: fadeIn 0.4s ease;
    }
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%);
      color: white; padding: 40px 30px; text-align: center;
    }
    .header h1 { margin: 0; font-size: 2.2rem; font-weight: 700; }
    .header p { margin: 8px 0 0; opacity: 0.9; font-size: 1rem; }
    .content { padding: 40px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
    .card-btn {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      border: 2px solid transparent; border-radius: 16px;
      padding: 30px 20px; cursor: pointer; text-align: center;
      transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .card-btn:hover {
      border-color: var(--primary); transform: translateY(-8px);
      box-shadow: 0 12px 25px rgba(102, 126, 234, 0.3);
    }
    .card-btn .emoji { font-size: 2.5rem; display: block; margin-bottom: 10px; }
    .card-btn h3 { margin: 10px 0 0; font-size: 1.15rem; font-weight: 600; }
    .btn {
      display: block; width: 100%; padding: 14px; margin-top: 12px;
      border: none; border-radius: 10px; font-weight: 600; cursor: pointer;
      transition: all 0.3s; font-size: 1rem;
    }
    .btn-main {
      background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%);
      color: white;
    }
    .btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); }
    .btn-main:active { transform: translateY(0); }
    .btn-outline {
      background: transparent; border: 2px solid var(--primary); color: var(--primary);
      font-weight: 600;
    }
    .btn-outline:hover { background: #f0f4ff; }

    .q-box {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      padding: 25px; border-radius: 16px; margin-bottom: 25px;
    }
    .q-box h3 { margin: 0 0 20px; font-size: 1.3rem; color: #2d3748; }
    .opt-list { list-style: none; padding: 0; margin: 0; }
    .opt-item {
      background: white; border: 2px solid #e2e8f0; padding: 16px 20px;
      margin-bottom: 12px; border-radius: 12px; cursor: pointer;
      transition: all 0.2s; font-size: 1rem;
    }
    .opt-item:hover:not(.answered) { border-color: #667eea; background: #f0f4ff; }
    .opt-item.answered { cursor: default; }
    .opt-item.correct { background: #c6f6d5; border-color: var(--success); color: #22543d; font-weight: 600; }
    .opt-item.wrong { background: #fed7d7; border-color: #f56565; color: #742a2a; font-weight: 600; }

    input[type="text"] {
      width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #e2e8f0;
      font-size: 1rem; transition: border 0.2s; font-family: inherit;
    }
    input[type="text"]:focus { outline: none; border-color: #667eea; background: #f0f4ff; }

    .feedback {
      padding: 16px 20px; border-radius: 12px; margin-top: 12px; display: none;
      line-height: 1.6; font-size: 0.95rem; animation: slideIn 0.3s ease;
    }
    .feedback.show { display: block; }
    .correct-msg { background: #c6f6d5; color: #22543d; }
    .wrong-msg { background: #fed7d7; color: #742a2a; }

    .hidden { display: none; }
    .progress-bar {
      height: 6px; background: #e2e8f0; border-radius: 3px; margin-bottom: 25px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--primary) 0%, #764ba2 100%);
      width: 0%; transition: width 0.3s ease; border-radius: 3px;
    }

    .result-area {
      text-align: center; padding: 30px;
    }
    .result-area h2 {
      font-size: 2rem; margin: 0 0 10px; background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .result-score {
      font-size: 3.5rem; font-weight: bold; color: var(--primary); margin: 20px 0;
    }
    .result-info { color: #718096; font-size: 1.1rem; margin: 15px 0; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-100vh) rotateZ(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotateZ(720deg); opacity: 0; }
    }
    @keyframes sad-fall {
      0% { transform: translateY(-50px) rotateZ(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotateZ(180deg); opacity: 0; }
    }
    .confetti {
      position: fixed; top: 0; font-size: 3rem; pointer-events: none; z-index: 9999;
      animation: confetti-fall 3s ease-in forwards;
    }
    .sad-emoji {
      position: fixed; top: 50%; font-size: 2.5rem; pointer-events: none; z-index: 9999;
      animation: sad-fall 3.5s ease-in forwards;
    }
    .score-display {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 4rem; font-weight: bold; color: var(--success);
      pointer-events: none; z-index: 9998;
      animation: scoreAppear 0.5s ease;
      text-shadow: 0 4px 12px rgba(72, 187, 120, 0.4);
    }
    @keyframes scoreAppear {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      70% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }

    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .header { padding: 30px 20px; }
      .header h1 { font-size: 1.8rem; }
      .content { padding: 20px; }
      .q-box { padding: 15px; }
      .app-wrapper { padding: 10px; }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div class="app-wrapper">
   <div class="app">
    <div class="header">
     <h1 id="main-title">English Learning Pro</h1>
     <p id="sub-title">Choose a topic to start</p>
    </div>
    <div class="content">
     <div id="step-topic">
      <div class="grid">
       <div class="card-btn" onclick="selectTopic('family')"><span class="emoji">🏠</span>
        <h3 class="topic-name">Family</h3><small style="color: #667eea; font-weight: 600;">Gia đình</small>
       </div>
       <div class="card-btn" onclick="selectTopic('travel')"><span class="emoji">✈️</span>
        <h3 class="topic-name">Travel</h3><small style="color: #667eea; font-weight: 600;">Du lịch</small>
       </div>
       <div class="card-btn" onclick="selectTopic('work')"><span class="emoji">💼</span>
        <h3 class="topic-name">Work</h3><small style="color: #667eea; font-weight: 600;">Công việc</small>
       </div>
      </div>
     </div>
     <div id="step-mode" class="hidden">
      <div class="grid">
       <div class="card-btn" onclick="startQuiz('mc')"><span class="emoji">📝</span>
        <h3 class="mode-name">Multiple Choice</h3><small style="color: #667eea; font-weight: 600;">Trắc nghiệm</small>
       </div>
       <div class="card-btn" onclick="startQuiz('fill')"><span class="emoji">✏️</span>
        <h3 class="mode-name">Fill the Blank</h3><small style="color: #667eea; font-weight: 600;">Điền từ</small>
       </div>
       <div class="card-btn" onclick="startQuiz('trans')"><span class="emoji">🌐</span>
        <h3 class="mode-name">Translation</h3><small style="color: #667eea; font-weight: 600;">Dịch câu</small>
       </div>
      </div><button class="btn btn-outline" style="margin-top: 20px; font-size: 1rem; padding: 8px 12px; width: auto;" onclick="goBack()" id="back-mode-btn">&lt;</button>
     </div>
     <div id="quiz-area" class="hidden">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
       <button class="btn btn-outline" style="font-size: 1rem; padding: 8px 12px; width: auto;" onclick="exitQuiz()" id="back-quiz-btn">&lt;</button>
       <div style="font-size: 1.2rem; font-weight: 600; color: var(--primary);" id="score-display">
        0 / 0
       </div>
      </div>
      <div class="progress-bar">
       <div id="progress" class="progress-fill"></div>
      </div>
      <div id="question-container" class="q-box"></div>
      <div id="input-area" class="hidden"><input type="text" id="user-answer" placeholder="Type your answer here..." onkeypress="handleInputKeypress(event)"> <button class="btn btn-main" id="check-btn" onclick="checkAnswer()">Check Answer</button>
      </div>
      <div id="feedback" class="feedback"></div><button id="next-btn" class="btn btn-main hidden" onclick="nextQuestion()">Next Question</button>
     </div>
     <div id="result-area" class="hidden result-area">
      <h2>Quiz Completed!</h2>
      <div class="result-score" id="final-score"></div>
      <div class="result-info" id="result-message"></div>
      <div id="detailed-stats" style="background: #f5f7fa; padding: 25px; border-radius: 12px; margin-top: 25px; text-align: left;">
       <h3 style="margin: 0 0 15px; color: #2d3748; font-size: 1.2rem;">📊 Chi tiết kết quả:</h3>
       <div id="stats-content" style="font-size: 0.95rem; line-height: 1.8; color: #4a5568;"></div>
       <div id="improvement-tips" style="background: white; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 4px solid var(--primary);"></div>
      </div><button class="btn btn-main" style="margin-top: 20px;" id="try-again-btn" onclick="location.reload()">Try Another Topic</button>
     </div>
    </div>
   </div>
  </div>
  <script>
let currentTopic = "";
let currentMode = "";
let currentIndex = 0;
let score = 0;
let activeQuestions = [];
let wrongAnswers = [];

// Initialize Element SDK
const defaultConfig = {
  header_title: "English Learning - 120 Questions",
  header_subtitle: "Select a topic to start learning",
  back_button_text: "Go Back",
  choose_mode_text: "Select a quiz type",
  next_question_text: "Next Question",
  check_answer_text: "Check Answer",
  try_again_text: "Try Another Topic",
  primary_color: "#4361ee",
  accent_color: "#4cc9f0",
  success_color: "#48bb78"
};

let config = { ...defaultConfig };

async function initElementSDK() {
  if (!window.elementSdk) return;

  await window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (updatedConfig) => {
      config = updatedConfig;
      updateUIFromConfig();
    },
    mapToCapabilities: () => ({
      recolorables: [
        {
          get: () => config.primary_color || defaultConfig.primary_color,
          set: (value) => {
            config.primary_color = value;
            window.elementSdk.setConfig({ primary_color: value });
          }
        },
        {
          get: () => config.accent_color || defaultConfig.accent_color,
          set: (value) => {
            config.accent_color = value;
            window.elementSdk.setConfig({ accent_color: value });
          }
        },
        {
          get: () => config.success_color || defaultConfig.success_color,
          set: (value) => {
            config.success_color = value;
            window.elementSdk.setConfig({ success_color: value });
          }
        }
      ],
      borderables: [],
      fontEditable: undefined,
      fontSizeable: undefined
    }),
    mapToEditPanelValues: () => new Map([
      ["header_title", config.header_title || defaultConfig.header_title],
      ["header_subtitle", config.header_subtitle || defaultConfig.header_subtitle],
      ["back_button_text", config.back_button_text || defaultConfig.back_button_text],
      ["choose_mode_text", config.choose_mode_text || defaultConfig.choose_mode_text],
      ["next_question_text", config.next_question_text || defaultConfig.next_question_text],
      ["check_answer_text", config.check_answer_text || defaultConfig.check_answer_text],
      ["try_again_text", config.try_again_text || defaultConfig.try_again_text],
      ["primary_color", config.primary_color || defaultConfig.primary_color],
      ["accent_color", config.accent_color || defaultConfig.accent_color],
      ["success_color", config.success_color || defaultConfig.success_color]
    ])
  });

  updateUIFromConfig();
}

function updateUIFromConfig() {
  // Update text content
  document.getElementById('main-title').textContent = config.header_title || defaultConfig.header_title;
  const isTopicStep = !document.getElementById('step-topic').classList.contains('hidden');
  if (isTopicStep) {
    document.getElementById('sub-title').textContent = config.header_subtitle || defaultConfig.header_subtitle;
  }

  // Update button texts
  const backModeBtn = document.getElementById('back-mode-btn');
  const backQuizBtn = document.getElementById('back-quiz-btn');
  const checkBtn = document.getElementById('check-btn');
  const nextBtn = document.getElementById('next-btn');
  const tryAgainBtn = document.getElementById('try-again-btn');
  
  if (backModeBtn) backModeBtn.textContent = config.back_button_text || defaultConfig.back_button_text;
  if (backQuizBtn) backQuizBtn.textContent = config.back_button_text || defaultConfig.back_button_text;
  if (checkBtn) checkBtn.textContent = config.check_answer_text || defaultConfig.check_answer_text;
  if (nextBtn) nextBtn.textContent = config.next_question_text || defaultConfig.next_question_text;
  if (tryAgainBtn) tryAgainBtn.textContent = config.try_again_text || defaultConfig.try_again_text;

  // Update colors in CSS
  const primaryColor = config.primary_color || defaultConfig.primary_color;
  const accentColor = config.accent_color || defaultConfig.accent_color;
  const successColor = config.success_color || defaultConfig.success_color;

  document.documentElement.style.setProperty('--primary', primaryColor);
  document.documentElement.style.setProperty('--accent', accentColor);
  document.documentElement.style.setProperty('--success', successColor);
}

function createConfetti(emoji) {
  for (let i = 0; i < 8; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.textContent = emoji;
    confetti.style.left = Math.random() * 100 + '%';
    confetti.style.animationDelay = Math.random() * 0.3 + 's';
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 3000);
  }
}

function displayScore() {
  const scoreDisplay = document.createElement('div');
  scoreDisplay.className = 'score-display';
  scoreDisplay.textContent = `+1`;
  document.body.appendChild(scoreDisplay);
  setTimeout(() => scoreDisplay.remove(), 1200);
}

function createSadEmojis() {
  const sadEmojis = ['😢', '😭', '🤦‍♂️'];
  for (let i = 0; i < 6; i++) {
    const emoji = document.createElement('div');
    emoji.className = 'sad-emoji';
    emoji.textContent = sadEmojis[i % 3];
    emoji.style.left = Math.random() * 100 + '%';
    emoji.style.animationDelay = Math.random() * 0.3 + 's';
    document.body.appendChild(emoji);
    setTimeout(() => emoji.remove(), 3500);
  }
}

function handleInputKeypress(event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    checkAnswer();
  }
}

function selectTopic(topic) {
  currentTopic = topic;
  document.getElementById('step-topic').classList.add('hidden');
  document.getElementById('step-mode').classList.remove('hidden');
  document.getElementById('sub-title').innerText = config.choose_mode_text || defaultConfig.choose_mode_text;
}

function startQuiz(mode) {
  currentMode = mode;
  activeQuestions = DATA[currentTopic][mode];
  currentIndex = 0;
  score = 0;
  wrongAnswers = [];

  document.getElementById('step-mode').classList.add('hidden');
  document.getElementById('quiz-area').classList.remove('hidden');
  
  const modeNames = { 'mc': "Multiple Choice", 'fill': "Fill the Blank", 'trans': "Translation" };
  document.getElementById('main-title').innerText = modeNames[mode];
  document.getElementById('score-display').textContent = `0 / ${activeQuestions.length}`;

  showQuestion();
}

function goBack() {
  document.getElementById('step-mode').classList.add('hidden');
  document.getElementById('step-topic').classList.remove('hidden');
  document.getElementById('sub-title').innerText = config.header_subtitle || defaultConfig.header_subtitle;
}

function exitQuiz() {
  document.getElementById('quiz-area').classList.add('hidden');
  document.getElementById('step-mode').classList.remove('hidden');
  document.getElementById('sub-title').innerText = config.choose_mode_text || defaultConfig.choose_mode_text;
}

function showQuestion() {
  const q = activeQuestions[currentIndex];
  const container = document.getElementById('question-container');
  const inputArea = document.getElementById('input-area');
  const feedback = document.getElementById('feedback');
  const nextBtn = document.getElementById('next-btn');

  feedback.className = "feedback";
  nextBtn.classList.add('hidden');

  document.getElementById('progress').style.width = ((currentIndex) / activeQuestions.length * 100) + "%";
  document.getElementById('score-display').textContent = `${score} / ${activeQuestions.length}`;

  if (currentMode === 'mc') {
    inputArea.classList.add('hidden');
    container.innerHTML = `<h3>${q.q}</h3><div class="opt-list">${q.options.map((opt) =>
      `<div class="opt-item" onclick="checkMC('${opt}')">${opt}</div>`).join('')}</div>`;
  } else {
    inputArea.classList.remove('hidden');
    container.innerHTML = `<h3>${q.q}</h3>`;
    document.getElementById('user-answer').value = "";
    document.getElementById('user-answer').focus();
  }
}

function checkMC(selected) {
  const q = activeQuestions[currentIndex];
  const items = document.querySelectorAll('.opt-item');
  const feedback = document.getElementById('feedback');

  items.forEach(item => {
    item.classList.add('answered');
    if (item.innerText === q.a) item.classList.add('correct');
    else if (item.innerText === selected && selected !== q.a) item.classList.add('wrong');
  });

  if (selected === q.a) {
    score++;
    const sticker = stickers[Math.floor(Math.random() * stickers.length)];
    const praise = praises[Math.floor(Math.random() * praises.length)];
    createConfetti(sticker);
    displayScore();
    feedback.innerHTML = `<span style="font-size: 2.5rem; display: block; margin-bottom: 8px;">${sticker}</span><b>${praise}</b>`;
    feedback.className = "feedback show correct-msg";
  } else {
    createSadEmojis();
    const wrongPraise = wrongPraises[Math.floor(Math.random() * wrongPraises.length)];
    wrongAnswers.push({
      question: q.q,
      userAnswer: selected,
      correctAnswer: q.a,
      explanation: q.ex
    });
    feedback.innerHTML = `<span style="font-size: 2.5rem; display: block; margin-bottom: 8px;">😢😭🤦‍♂️</span><b>${wrongPraise}</b> Đáp án là: <b>${q.a}</b><br><small>💡 ${q.ex}</small>`;
    feedback.className = "feedback show wrong-msg";
  }
  document.getElementById('next-btn').classList.remove('hidden');
}

function checkAnswer() {
  const q = activeQuestions[currentIndex];
  const userAns = document.getElementById('user-answer').value.trim().toLowerCase();
  const correctAns = q.a.toLowerCase().replace(/[.,]/g, '');
  const feedback = document.getElementById('feedback');

  if (userAns === correctAns) {
    score++;
    const sticker = stickers[Math.floor(Math.random() * stickers.length)];
    const praise = praises[Math.floor(Math.random() * praises.length)];
    createConfetti(sticker);
    displayScore();
    feedback.innerHTML = `<span style="font-size: 2.5rem; display: block; margin-bottom: 8px;">${sticker}</span><b>${praise}</b>`;
    feedback.className = "feedback show correct-msg";
  } else {
    createSadEmojis();
    const wrongPraise = wrongPraises[Math.floor(Math.random() * wrongPraises.length)];
    wrongAnswers.push({
      question: q.q,
      userAnswer: userAns,
      correctAnswer: q.a,
      explanation: q.ex
    });
    feedback.innerHTML = `<span style="font-size: 2.5rem; display: block; margin-bottom: 8px;">😢😭🤦‍♂️</span><b>${wrongPraise}</b> Đáp án là: <b>${q.a}</b><br><small>💡 ${q.ex}</small>`;
    feedback.className = "feedback show wrong-msg";
  }
  document.getElementById('next-btn').classList.remove('hidden');
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex < activeQuestions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quiz-area').classList.add('hidden');
  document.getElementById('result-area').classList.remove('hidden');
  
  const total = activeQuestions.length;
  const percent = Math.round((score / total) * 100);
  
  document.getElementById('final-score').innerText = `${score} / ${total}`;
  
  let message = "";
  if (percent === 100) message = "🏆 Perfect score! Outstanding!";
  else if (percent >= 80) message = "🎉 Excellent work!";
  else if (percent >= 60) message = "👍 Good job! Keep practicing.";
  else message = "📚 Keep learning! You'll improve.";
  
  document.getElementById('result-message').innerText = message;
  document.getElementById('sub-title').innerText = "Quiz Results";

  // Display detailed stats
  const statsContent = document.getElementById('stats-content');
  statsContent.innerHTML = `
    <div><strong>✅ Câu đúng:</strong> ${score}/${total}</div>
    <div><strong>❌ Câu sai:</strong> ${wrongAnswers.length}/${total}</div>
    <div><strong>📈 Tỷ lệ chính xác:</strong> ${percent}%</div>
  `;

  // Display improvement tips
  const improvementTips = document.getElementById('improvement-tips');
  let tipsHTML = '<strong>💡 Những điểm cần cải thiện:</strong><br>';
  
  if (wrongAnswers.length > 0) {
    tipsHTML += '<div style="margin-top: 10px;">';
    wrongAnswers.forEach((wrong, idx) => {
      tipsHTML += `
        <div style="margin-bottom: 12px; padding: 10px; background: #fff5f5; border-radius: 8px;">
          <div><strong>Câu ${idx + 1}:</strong> ${wrong.question}</div>
          <div style="color: #e53e3e; margin-top: 5px;">❌ Bạn trả lời: <em>${wrong.userAnswer}</em></div>
          <div style="color: #22863a; margin-top: 5px;">✅ Đáp án đúng: <strong>${wrong.correctAnswer}</strong></div>
          <div style="color: #666; margin-top: 5px; font-style: italic;">💬 ${wrong.explanation}</div>
        </div>
      `;
    });
    tipsHTML += '</div>';
    
    tipsHTML += '<div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #e2e8f0;"><strong>🎯 Gợi ý cải thiện:</strong><ul style="margin: 10px 0; padding-left: 20px;">';
    tipsHTML += '<li>Xem lại các câu sai ở trên</li>';
    tipsHTML += '<li>Học kỹ giải thích cho từng câu</li>';
    tipsHTML += '<li>Làm lại bài kiểm tra để cải thiện điểm</li>';
    tipsHTML += '<li>Tập trung vào từ vựng và ngữ pháp còn yếu</li>';
    tipsHTML += '</ul></div>';
  } else {
    tipsHTML += '<div style="color: #22863a; padding: 10px; background: #f0f9ff; border-radius: 8px;">🎊 Bạn làm tuyệt vời! Không có câu nào sai. Hãy thử các chủ đề khác để tiếp tục học!</div>';
  }
  
  improvementTips.innerHTML = tipsHTML;
}
